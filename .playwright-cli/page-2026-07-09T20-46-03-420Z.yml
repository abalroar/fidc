                    - text: "Esta folha é parte integrante da Convocação para Assembleia Especial de Cotistas da Classe Única de Cotas do Crédito Universitário Fundo de Investimento em Direitos Creditórios – Responsabilidade Limitada, datada de 18 de junho de 2025. CLASSE ÚNICA DE COTAS DO CRÉDITO UNIVERSITÁRIO FUNDO DE INVESTIMENTO EM DIREITOS CREDITÓRIOS – RESPONSABILIDADE LIMITADA CNPJ nº 08.417.544/0001-65 CONVOCAÇÃO PARA A ASSEMBLEIA ESPECIAL DE COTISTAS Rio de Janeiro, 18 de junho de 2025. Ref.: Convocação para a Assembleia Especial de Cotistas da Classe Única de Cotas do Crédito Universitário Fundo de Investimento em Direitos Creditórios - Responsabilidade Limitada Prezado(a) Cotista, Oliveira Trust Distribuidora de Títulos e Valores Mobiliários S.A., inscrita no CNPJ sob o nº 36.113.876/0001- 91, na qualidade de instituição administradora do CRÉDITO UNIVERSITÁRIO FUNDO DE INVESTIMENTO EM DIREITOS CREDITÓRIOS – RESPONSABILIDADE LIMITADA, fundo de investimento em direitos creditórios constituído sob a forma de condomínio fechado, inscrito no CNPJ sob o nº 08.417.544/0001 -65 (“Administradora” e “Fundo”, respectivamente), vem, por meio desta, convidá -lo(a) para participar de Assembleia Especial de Cotistas, a realizar-se por meio de videoconferênciaa partir da sede social da Administradora, localizada na Avenida das Américas, nº 3.434, bloco 7, sala 201, Condomínio Mario Henrique Simonsen, Barra da Tijuca, Rio de Janeiro/RJ, em primeira convocação, em 30 de junho de 2025, às 11:00 horas, e, em segunda convocação, em 07 de julho de 2025, às 11:00 horas, a fim de deliberar sobre a seguinte ORDEM DO DIA: (i) a emissão da 35ª (trigésima quinta) série de cotas seniores do Fundo (“Cotas Seniores da 35ª Série”); (ii) a emissão de nova subclasse de Cotas Subordinadas Mezanino I, a ser denominada “Cota Subordinada Mezanino I-M” (“Cotas Subordinadas Mezanino I-M”), conforme solicitação feita pelo Pravaler S.A., inscrito no CNPJ sob o nº 04.531.065/0001-14, na qualidade de gestor da carteira do Fundo (“Gestor”); (iii) a emissão de nova subclasse de Cotas Subordinadas Mezanino II, a ser denominada “Cota Subordinada Mezanino II-E” (“Cotas Subordinadas Mezanino II-E”), conforme solicitação feita pelo Gestor; (iv) a realização da oferta pública de distribuição das Cotas Seniores da 35ª Série, as Cotas Subordinadas Mezanino I-M e das Cotas Subordinadas Mezanino II-E, nos termos da Resolução da Comissão de Valores Mobiliários – CVM nº 160, de 13 de julho de 2022, conforme alterada (“Resolução CVM 160 ”), via rito de registro automático sem análise prévia da CVM (“OfSerta”) exclusivamente junto a investidores profissionais, nos termos do Artigo 11 da Resolução da CVM nº 30, de 11 de maio de 2021, conforme alterada (“Investidores Profissionais”) com a contratação do ITAÚ BBA ASSESSORIA FINANCEIRA S.A., sociedade anônima autorizada pela CVM para o exercício da atividade de coordenação de ofertas públicas de distribuição de valores mobiliários, com sede na cidade de São Paulo, Estado de Sã"
