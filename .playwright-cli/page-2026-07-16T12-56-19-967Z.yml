                  - paragraph [ref=f1e23362]: Um número contratual observado em um fundo não vira parâmetro universal. Ausência na extração não comprova inexistência da cláusula. Cache textual sem PDF recuperável serve para localizar candidatos, não para afirmação categórica.
                  - heading "O que o Informe Mensal entrega" [level=2] [ref=f1e23364]:
                    - text: O que o Informe Mensal entrega
                    - generic [ref=f1e23365]:
                      - link "Link to heading":
                        - /url: "#o-que-o-informe-mensal-entrega"
                  - paragraph [ref=f1e23366]:
                    - text: O Informe Mensal é uma fotografia regulatória padronizada. Entre outras informações, permite acompanhar patrimônio líquido, composição da carteira, vencidos por faixa, provisões/reduções ao valor recuperável, aquisições, alienações, liquidações, cotas e movimentações reportadas. A
                    - link "Tabela II" [ref=f1e23367] [cursor=pointer]:
                      - /url: regulacao/informe-mensal-tabela-ii.md
                    - text: distribui a carteira em 11 segmentos oficiais e detalha o bloco Financeiro em oito aberturas.
                  - paragraph [ref=f1e23368]: "Ele não substitui o regulamento, a parte geral, o anexo da classe, o instrumento de emissão, os contratos de transferência, os relatórios de rating, as atas ou as demonstrações financeiras. Também não resolve sozinho:"
                  - list [ref=f1e23369]:
                    - listitem [ref=f1e23370]: se o crédito satisfaz todos os critérios de elegibilidade;
                    - listitem [ref=f1e23371]: a ordem contratual de pagamentos e absorção de perdas;
                    - listitem [ref=f1e23372]: os limites por devedor, cedente, originador ou grupo econômico;
                    - listitem [ref=f1e23373]: a existência e suficiência jurídica de garantias;
                    - listitem [ref=f1e23374]: o texto e o estado de gatilhos, períodos de cura ou waivers;
                    - listitem [ref=f1e23375]: a qualidade da originação, cobrança e conciliação.
                  - heading "Níveis que não devem ser confundidos" [level=2] [ref=f1e23377]:
                    - text: Níveis que não devem ser confundidos
                    - generic [ref=f1e23378]:
                      - link "Link to heading":
                        - /url: "#niveis-que-nao-devem-ser-confundidos"
                  - list [ref=f1e23379]:
                    - listitem [ref=f1e23380]:
                      - strong [ref=f1e23381]: "Fundo:"
                      - text: condomínio especial constituído sob a RCVM 175.
                    - listitem [ref=f1e23382]:
                      - strong [ref=f1e23383]: "Classe:"
                      - text: patrimônio segregado; direitos e obrigações ficam vinculados à classe.
                    - listitem [ref=f1e23384]:
                      - strong [ref=f1e23385]: "Subclasse:"
                      - text: categoria de cotas da mesma classe, inclusive sênior, mezanino ou subordinada em FIDC; não tem patrimônio separado próprio.
                    - listitem [ref=f1e23386]:
                      - strong [ref=f1e23387]: "Série:"
                      - text: subconjunto de cotas seniores de classe fechada, diferenciado por prazo, amortização e/ou índice referencial quando admitido.
                    - listitem [ref=f1e23388]:
                      - strong [ref=f1e23389]: "Cota:"
                      - text: fração patrimonial da classe. “Tranche” é linguagem econômica ou legada e deve ser mapeada ao instrumento jurídico efetivo.
                  - heading "Vocabulário de classificação" [level=2] [ref=f1e23391]:
                    - text: Vocabulário de classificação
                    - generic [ref=f1e23392]:
                      - link "Link to heading":
                        - /url: "#vocabulario-de-classificacao"
                  - paragraph [ref=f1e23393]: "Este book usa apenas:"
                  - list [ref=f1e23394]:
                    - listitem [ref=f1e23395]:
                      - strong [ref=f1e23396]: segmento oficial da Tabela II do Informe Mensal
                      - text: para os 11 blocos oficiais;
                    - listitem [ref=f1e23397]:
                      - strong [ref=f1e23398]: abertura financeira da Tabela II
                      - text: para F1 a F8;
                    - listitem [ref=f1e23399]:
                      - strong [ref=f1e23400]: taxonomia funcional documental
                      - text: para classificações inferidas de documentos, como consignado, risco sacado, meios de pagamento, crédito estudantil ou NPL;
                    - listitem [ref=f1e23401]:
                      - strong [ref=f1e23402]: Sem segmentação IME
                      - text: quando a Tabela II não contém valores suficientes. É um estrato de qualidade de dados, não categoria oficial de ativo.
                  - heading "Escopo da revisão de 2026" [level=2] [ref=f1e23404]:
                    - text: Escopo da revisão de 2026
                    - generic [ref=f1e23405]:
                      - link "Link to heading":
                        - /url: "#escopo-da-revisao-de-2026"
                  - paragraph [ref=f1e23406]:
                    - text: A revisão foi confrontada com a RCVM 175 consolidada após a RCVM 240/2026, demais fontes oficiais listadas em
                    - link "Referências e rastreabilidade" [ref=f1e23407] [cursor=pointer]:
                      - /url: fontes/referencias.md
                    - text: e um corpus congelado de exatamente 100 fundos na competência 202605. A amostra maximiza patrimônio líquido sujeito à cobertura mínima dos estratos ocupados; os casos servem como evidência de linguagem e prática, não como perfis ou avaliação corrente.
